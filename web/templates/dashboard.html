<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - WhatsApp Bot SaaS</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .negocios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            🤖 WhatsApp Bot SaaS
            <span>Beta</span>
        </div>
        <div class="navbar-menu">
            <a href="/dashboard">Dashboard</a>
            <div id="userInfo" class="user-info"></div>
        </div>
    </nav>

    <div class="container">
        <div id="alertContainer"></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="totalNegocios">0</div>
                <div class="label">Negocios</div>
            </div>
            <div class="stat-card">
                <div class="number" id="verificados">0</div>
                <div class="label">Verificados</div>
            </div>
        </div>

        <!-- Header -->
        <div class="d-flex justify-between align-center mb-4">
            <h2>Mis Negocios</h2>
            <button class="btn btn-primary" onclick="abrirModalCrear()">
                ➕ Nuevo Negocio
            </button>
        </div>

        <!-- Negocios Container -->
        <div id="negociosContainer"></div>
    </div>

    <!-- Modal Crear Negocio -->
    <div id="modalCrear" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Registrar Nuevo Negocio</h3>
                <button class="modal-close" onclick="cerrarModalCrear()">&times;</button>
            </div>
            <form id="formCrearNegocio">
                <div class="modal-body">
                    <div class="form-group">
                        <label class="form-label">Nombre del negocio *</label>
                        <input type="text" id="nombreNegocio" class="form-control" required placeholder="Ej: Mi Pastelería">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teléfono de WhatsApp (phone_id) *</label>
                        <input type="text" id="phoneId" class="form-control" required placeholder="Ej: 123456789012345">
                        <small class="text-muted">El número de teléfono asociado a tu cuenta de WhatsApp Business</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Token de WhatsApp *</label>
                        <input type="text" id="token" class="form-control" required placeholder="Token de Meta">
                        <small class="text-muted">El token de acceso permanente de tu aplicación de Meta</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tipo de negocio</label>
                        <select id="tipoNegocio" class="form-control">
                            <option value="restaurante">🍽️ Restaurante</option>
                            <option value="pasteleria">🍰 Pastelería</option>
                            <option value="panaderia">🥖 Panadería</option>
                            <option value="inmobiliaria">🏠 Inmobiliaria</option>
                            <option value="venta_autos">🚗 Venta de Autos</option>
                            <option value="venta_motos">🏍️ Venta de Motos</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="cerrarModalCrear()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Registrar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import './static/js/dashboard.js';
    </script>
</body>
</html>
