{% extends "base.html" %}

{% block title %}Recursos Visuales - {{ tenant.nombre }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Recursos Visuales</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <button type="button" class="btn btn-sm btn-primary" onclick="agregarRecurso()">
                <i class="fas fa-plus"></i> Agregar Recurso
            </button>
        </div>
    </div>

    <div class="row" id="recursos-container">
        <div class="col-12 text-center">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </div>
</div>

<!-- Modal para enviar por WhatsApp -->
<div class="modal fade" id="enviarWhatsAppModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Enviar por WhatsApp</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="recurso-info"></div>
                <div class="mb-3">
                    <label for="numero-cliente" class="form-label">Número de teléfono del cliente:</label>
                    <input type="tel" class="form-control" id="numero-cliente" 
                           placeholder="Ej: 573001234567">
                    <small class="text-muted">Formato: Código país + número (Ej: 573001234567)</small>
                </div>
                <div id="mensaje-envio" class="alert alert-info" style="display:none">
                    <span id="mensaje-texto"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="enviarRecurso()">
                    <i class="fab fa-whatsapp"></i> Enviar
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const tenantId = '{{ tenant.id }}';
let recursoSeleccionado = null;

async function cargarRecursos() {
    try {
        const response = await fetch(`/api/tenant/${tenantId}/recursos`);
        const recursos = await response.json();
        
        const container = document.getElementById('recursos-container');
        
        if (recursos.length === 0) {
            container.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-info text-center">
                        No hay recursos visuales agregados. Haz clic en "Agregar Recurso" para comenzar.
                    </div>
                </div>
            `;
            return;
        }
        
        container.innerHTML = recursos.map(recurso => `
            <div class="col-md-4 mb-3">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title">${getTipoEmoji(recurso.tipo)} ${escapeHtml(recurso.nombre)}</h5>
                        <p class="card-text">${escapeHtml(recurso.descripcion || 'Sin descripción')}</p>
                        <p><strong>Tipo:</strong> ${recurso.tipo}</p>
                        ${recurso.url ? `<a href="${escapeHtml(recurso.url)}" target="_blank" class="btn btn-sm btn-info">Ver recurso</a>` : ''}
                        <button class="btn btn-sm btn-success" onclick="abrirModalEnviar(${recurso.id}, '${escapeHtml(recurso.nombre)}')">
                            <i class="fab fa-whatsapp"></i> Enviar por WhatsApp
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="eliminarRecurso(${recurso.id})">Eliminar</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (error) {
        console.error('Error cargando recursos:', error);
        document.getElementById('recursos-container').innerHTML = `
            <div class="col-12">
                <div class="alert alert-danger">Error al cargar los recursos</div>
            </div>
        `;
    }
}

function getTipoEmoji(tipo) {
    const emojis = {
        'imagen': '🖼️',
        'video': '🎥',
        'pdf': '📄',
        'documento': '📁',
        'enlace': '🔗'
    };
    return emojis[tipo] || '📎';
}

function abrirModalEnviar(recursoId, recursoNombre) {
    recursoSeleccionado = { id: recursoId, nombre: recursoNombre };
    document.getElementById('recurso-info').innerHTML = `
        <div class="alert alert-success">
            <strong>Recurso seleccionado:</strong> ${escapeHtml(recursoNombre)}
        </div>
    `;
    document.getElementById('numero-cliente').value = '';
    document.getElementById('mensaje-envio').style.display = 'none';
    
    const modal = new bootstrap.Modal(document.getElementById('enviarWhatsAppModal'));
    modal.show();
}

async function enviarRecurso() {
    const numeroCliente = document.getElementById('numero-cliente').value.trim();
    
    if (!numeroCliente) {
        mostrarMensaje('error', 'Por favor ingresa un número de teléfono');
        return;
    }
    
    // Validar formato básico
    if (!numeroCliente.match(/^[0-9]{10,15}$/)) {
        mostrarMensaje('error', 'Formato inválido. Usa solo números (código país + número)');
        return;
    }
    
    const btnEnviar = document.querySelector('#enviarWhatsAppModal .btn-success');
    btnEnviar.disabled = true;
    btnEnviar.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Enviando...';
    
    try {
        const response = await fetch(`/api/recursos/compartir/${tenantId}/${recursoSeleccionado.id}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ numero: numeroCliente })
        });
        
        const data = await response.json();
        
        if (data.success) {
            mostrarMensaje('success', data.message);
            setTimeout(() => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('enviarWhatsAppModal'));
                modal.hide();
            }, 2000);
        } else {
            mostrarMensaje('error', data.error || 'Error al enviar');
        }
    } catch (error) {
        console.error('Error:', error);
        mostrarMensaje('error', 'Error de conexión');
    } finally {
        btnEnviar.disabled = false;
        btnEnviar.innerHTML = '<i class="fab fa-whatsapp"></i> Enviar';
    }
}

function mostrarMensaje(tipo, texto) {
    const mensajeDiv = document.getElementById('mensaje-envio');
    const mensajeTexto = document.getElementById('mensaje-texto');
    
    mensajeDiv.className = tipo === 'success' ? 'alert alert-success' : 'alert alert-danger';
    mensajeTexto.textContent = texto;
    mensajeDiv.style.display = 'block';
    
    setTimeout(() => {
        mensajeDiv.style.display = 'none';
    }, 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function agregarRecurso() {
    const nombre = prompt('Nombre del recurso:');
    if (!nombre) return;
    
    const tipo = prompt('Tipo (imagen, video, pdf, documento, enlace):');
    if (!tipo) return;
    
    const url = prompt('URL del recurso:');
    
    fetch(`/api/tenant/${tenantId}/recursos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, tipo, url })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            cargarRecursos();
        } else {
            alert('Error: ' + (data.error || 'No se pudo agregar'));
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error al agregar recurso');
    });
}

function eliminarRecurso(recursoId) {
    if (!confirm('¿Eliminar este recurso? Esta acción no se puede deshacer.')) return;
    
    fetch(`/api/tenant/${tenantId}/recursos/${recursoId}`, {
        method: 'DELETE'
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            cargarRecursos();
        } else {
            alert('Error: ' + (data.error || 'No se pudo eliminar'));
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Error al eliminar recurso');
    });
}

cargarRecursos();
</script>

<style>
.btn-success i, .btn-success .fab {
    margin-right: 5px;
}
.btn-sm {
    margin: 2px;
}
.card {
    transition: transform 0.2s;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
</style>
{% endblock %}
