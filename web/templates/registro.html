<!DOCTYPE html>
<html>
<head>
    <title>Registrar negocio</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #25D366; color: white; border: none; cursor: pointer; }
        button:hover { background: #128C7E; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; }
    </style>
</head>
<body>
    <h2>🚀 Registrar nuevo negocio</h2>
    <p>Completa los datos para conectar tu WhatsApp Business</p>
    
    <form action="/registro_web" method="post">
        <div class="form-group">
            <label>Nombre del negocio</label>
            <input name="nombre" placeholder="Ej: Pizzería Avars" required>
        </div>
        
        <div class="form-group">
            <label>Phone ID</label>
            <input name="phone_id" placeholder="Ej: 123456789" required>
        </div>
        
        <div class="form-group">
            <label>Token</label>
            <input name="token" placeholder="EAA..." required>
        </div>
        
        <button type="submit">Registrar</button>
    </form>
</body>
</html>
