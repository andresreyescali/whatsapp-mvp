<!DOCTYPE html>
<html>
<head>
    <title>Registrar negocio</title>
</head>
<body>

    <h2>🚀 Conecta tu WhatsApp</h2>

    <p>
        1. Ve a Meta Developers<br>
        2. Copia tu token<br>
        3. Copia tu phone_id<br>
        4. Pégalos aquí 👇
    </p>

    <form action="/registro_web" method="post">
        <label>Nombre del negocio</label><br>
        <input name="nombre" placeholder="Ej: Pizzería Avars" required><br><br>

        <label>Phone ID</label><br>
        <input name="phone_id" placeholder="Ej: 123456789" required><br><br>

        <label>Token</label><br>
        <input name="token" placeholder="EAA..." required><br><br>

        <button type="submit">Registrar</button>
    </form>

</body>
</html>
